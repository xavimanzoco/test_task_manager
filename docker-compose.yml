services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL_CLIENT=http://localhost:3001
    ports:
      - "3000:3000"
    environment:
      - API_URL_SERVER=http://backend:3001
    depends_on:
      - backend

volumes:
  db-data:
